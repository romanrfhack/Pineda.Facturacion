name: CI

on:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - '.github/workflows/**'
              - 'Directory.Build.props'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'

  backend_tests:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: Strong_Passw0rd_2026!
          MYSQL_DATABASE: facturas_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      ConnectionStrings__DefaultConnection: Server=localhost;Database=facturas_test;User=root;Password=Strong_Passw0rd_2026!;
    steps:
      - uses: actions/checkout@v4
      - name: Guard versioned runtime config
        shell: bash
        run: |
          set -euo pipefail
          if rg -n 'Root123!|User ID=root|CHANGE_ME_MIN_32_CHARACTERS_FOR_PRODUCTION_USE|SANDBOX_ONLY_|CHANGE_ME_DEV_ONLY|CHANGE_ME_NON_PRODUCTION_ONLY' src/Pineda.Facturacion.Api/appsettings*.json; then
            echo "ERROR: versioned runtime config still contains forbidden secrets/defaults."
            exit 1
          fi
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore Pineda.Facturacion.slnx
      - name: Build
        run: dotnet build -c Release Pineda.Facturacion.slnx
      - name: Diagnose test environment
        env:
          DOTNET_ENVIRONMENT: Development
          ASPNETCORE_ENVIRONMENT: Development
        run: |
          dotnet --info
          echo "DOTNET_ENVIRONMENT=$DOTNET_ENVIRONMENT"
          echo "ASPNETCORE_ENVIRONMENT=$ASPNETCORE_ENVIRONMENT"
      - name: Test
        env:
          DOTNET_ENVIRONMENT: Development
          ASPNETCORE_ENVIRONMENT: Development
        run: dotnet test -c Release Pineda.Facturacion.slnx

      - name: MySQL-backed integration subset
        env:
          DOTNET_ENVIRONMENT: Development
          ASPNETCORE_ENVIRONMENT: Development
          PINEDA_FACTURACION_RUN_MYSQL_TESTS: "true"
          PINEDA_FACTURACION_MYSQL_TEST_CONNECTION: Server=127.0.0.1;Port=3306;User ID=root;Password=Strong_Passw0rd_2026!;AllowPublicKeyRetrieval=True;SslMode=None;
        run: dotnet test -c Release tests/Pineda.Facturacion.IntegrationTests/Pineda.Facturacion.IntegrationTests.csproj --filter "Category=MySqlIntegration" --no-build

  frontend_tests:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Unit tests
        working-directory: frontend
        run: npm run test

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        working-directory: frontend
        run: npm run e2e:ci
