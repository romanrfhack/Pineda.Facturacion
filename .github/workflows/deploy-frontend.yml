name: Deploy Frontend (Facturas)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-frontend-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest

    env:
      SSH_HOST: ${{ secrets.FACTURAS_SSH_HOST }}
      SSH_PORT: ${{ secrets.FACTURAS_SSH_PORT }}
      SSH_USER: ${{ secrets.FACTURAS_SSH_USER }}
      SSH_KEY_B64: ${{ secrets.FACTURAS_SSH_KEY_B64 }}
      WEB_PATH: /var/www/facturas-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Detect frontend changes for workflow_run
        if: github.event_name == 'workflow_run'
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD^ HEAD)
          else
            CHANGED=$(git show --pretty='' --name-only HEAD)
          fi
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -q '^frontend/'; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy when frontend did not change
        if: github.event_name == 'workflow_run' && steps.changed.outputs.frontend_changed != 'true'
        run: |
          echo "No frontend/** changes detected. Skipping frontend deploy."
          exit 0

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.frontend_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install deps
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.frontend_changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build (production)
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.frontend_changed == 'true'
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Detect build output
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.frontend_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Angular default output: dist/<projectName>/browser
          if [ -d "frontend/dist/frontend/browser" ]; then
            echo "DIST_DIR=frontend/dist/frontend/browser" >> $GITHUB_ENV
          elif [ -d "frontend/dist/frontend" ]; then
            echo "DIST_DIR=frontend/dist/frontend" >> $GITHUB_ENV
          else
            echo "ERROR: No se encontró el directorio de salida"
            find frontend/dist -maxdepth 3 -type d -name "browser" -o -name "frontend" | head -5
            exit 1
          fi

      - name: Setup SSH
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.frontend_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Prepare remote folder (clean)
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.frontend_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "mkdir -p '$WEB_PATH' && find '$WEB_PATH' -mindepth 1 -maxdepth 1 -exec rm -rf {} +"

      - name: Deploy via rsync
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.frontend_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete -O --no-perms --no-owner --no-group \
            "$DIST_DIR"/ \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -p $SSH_PORT" \
            "$SSH_USER@$SSH_HOST:$WEB_PATH/"
      
      - name: Set ownership and permissions
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.frontend_changed == 'true'
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "sudo chown -R www-data:www-data $WEB_PATH && sudo chmod -R 755 $WEB_PATH"