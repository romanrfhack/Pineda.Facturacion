name: Deploy Backend (Facturas API)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  build-and-deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest

    env:
      SSH_HOST: ${{ secrets.FACTURAS_SSH_HOST }}
      SSH_PORT: ${{ secrets.FACTURAS_SSH_PORT }}
      SSH_USER: ${{ secrets.FACTURAS_SSH_USER }}
      SSH_KEY_B64: ${{ secrets.FACTURAS_SSH_KEY_B64 }}
      DEPLOY_PATH: /var/www/facturas-backend/publish   # Agregado
      ASPNETCORE_ENVIRONMENT: Sandbox

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      # ... (detect changes, skip, setup .NET, publish) ...

      - name: Setup SSH
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.backend_changed == 'true'
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload API to server
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.backend_changed == 'true'
        run: |
          # Crear la carpeta publish y limpiar su contenido
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "mkdir -p $DEPLOY_PATH && rm -rf $DEPLOY_PATH/*"

          # Subir archivos a la carpeta publish
          scp -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -P "$SSH_PORT" -r \
            out/api/* "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Set ownership and permissions
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.backend_changed == 'true'
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "sudo chown -R www-data:www-data /var/www/facturas-backend && sudo chmod -R 755 /var/www/facturas-backend"

      - name: Restart service
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.backend_changed == 'true'
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "sudo systemctl daemon-reload && \
             sudo systemctl restart facturas-api && \
             systemctl is-active --quiet facturas-api && \
             systemctl status facturas-api --no-pager -l"